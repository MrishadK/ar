<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR - Place Food on Table</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@react-three/xr@latest/dist/react-three-xr.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/vr/WebXRButton.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <script>
        let camera, scene, renderer, controller, model;
        let reticle; // Reticle for detecting surfaces

        function init() {
            // Create scene and camera
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; // Enable WebXR
            document.body.appendChild(renderer.domElement);

            // Add light
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            // Load AR button
            document.body.appendChild(WEBXR.createButton(renderer));

            // Load AR session
            renderer.xr.addEventListener('sessionstart', async () => {
                const session = renderer.xr.getSession();
                const referenceSpace = await session.requestReferenceSpace('local');
                const hitTestSource = await session.requestHitTestSource({ space: referenceSpace });

                session.addEventListener('select', () => placeModel(hitTestSource));
            });

            // Load the reticle (indicator for flat surfaces)
            const geometry = new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            reticle = new THREE.Mesh(geometry, material);
            reticle.visible = false;
            scene.add(reticle);

            // Load GLTF model (burger.glb)
            const loader = new THREE.GLTFLoader();
            loader.load('burger.glb', gltf => {
                model = gltf.scene;
                model.scale.set(0.5, 0.5, 0.5); // Adjust model size
                model.visible = false;
                scene.add(model);
            });

            // Add controller for user interaction
            controller = renderer.xr.getController(0);
            scene.add(controller);
        }

        function animate() {
            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        }

        function placeModel(hitTestSource) {
            if (hitTestSource && model) {
                const hitTestResults = hitTestSource.getHitTestResults();
                if (hitTestResults.length > 0) {
                    const hitPose = hitTestResults[0].getPose();
                    model.position.set(hitPose.transform.position.x, hitPose.transform.position.y, hitPose.transform.position.z);
                    model.visible = true;
                }
            }
        }

        init();
        animate();
    </script>
</body>
</html>
