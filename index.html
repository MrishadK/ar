<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Proper Viewport Meta Tag for Mobile Devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Burger on Desk</title>

  <!-- A-Frame & AR.js -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    .arjs-loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: white;
    }
    .arjs-surface-message {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      border-radius: 5px;
      display: none;
    }
  </style>
</head>
<body>

  <!-- AR.js Scene -->
  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; detectionMode: mono_and_matrix; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true; precision: medium;"
  >
    <!-- AR Model: Show Only on Desk -->
    <a-entity
      id="burger"
      gltf-model="url(burger.glb)"
      scale="0.03 0.03 0.03"  <!-- Smaller size -->
      position="0 0 0"
      visible="false"
      arjs-hit-test="targetElement: #burger;"
    ></a-entity>

    <!-- Camera with Adjusted FOV for Mobile -->
    <a-entity camera look-controls="enabled: false" fov="80"></a-entity>
  </a-scene>

  <!-- Loading Message -->
  <div class="arjs-loader">Loading AR experience...</div>

  <!-- Surface Detection Message -->
  <div class="arjs-surface-message">Point your camera at a desk to place the burger.</div>

  <script>
    document.querySelector('a-scene').addEventListener('loaded', function () {
      document.querySelector('.arjs-loader').style.display = 'none';
    });

    const burger = document.querySelector('#burger');
    const surfaceMessage = document.querySelector('.arjs-surface-message');

    // Only show on flat surfaces (Desk detection)
    burger.addEventListener('arjs-hit-test-start', function () {
      surfaceMessage.style.display = 'block';  // Show guidance message
    });

    burger.addEventListener('arjs-hit-test-achieved', function (event) {
      const yPosition = event.detail.position.y;
      if (yPosition > 0.2) { // Ignore surfaces that are too high (like walls)
        burger.setAttribute('visible', 'false');
      } else {
        burger.setAttribute('visible', 'true');
        surfaceMessage.style.display = 'none';
      }
    });

    burger.addEventListener('arjs-hit-test-lost', function () {
      burger.setAttribute('visible', 'false'); // Hide when surface lost
      surfaceMessage.style.display = 'block';
    });
  </script>

</body>
</html>
