<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markerless AR - Burger on Tabletop</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    .arjs-loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: white;
    }
  </style>
</head>
<body>
  <!-- AR.js Scene -->
  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; detectionMode: mono; debugUIEnabled: false;"
  >
    <!-- Markerless AR (Hit Testing) -->
    <a-entity
      id="burger"
      gltf-model="url(burger.glb)"
      scale="0.1 0.1 0.1"
      position="0 0 0"
      rotation="0 0 0"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 10000"
      arjs-hit-test="targetElement: #burger;"
    ></a-entity>

    <!-- Camera -->
    <a-entity camera></a-entity>
  </a-scene>

  <!-- Loading Message -->
  <div class="arjs-loader">Loading AR experience...</div>

  <script>
    // Hide loader when AR scene is loaded
    document.querySelector('a-scene').addEventListener('loaded', function () {
      document.querySelector('.arjs-loader').style.display = 'none';
    });
  </script>
</body>
</html>
