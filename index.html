<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markerless AR - Burger on Tabletop</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    .arjs-loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: white;
    }
    .arjs-surface-message {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      border-radius: 5px;
      display: none;
    }
  </style>
</head>
<body>
  <!-- AR.js Scene -->
  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; detectionMode: mono; debugUIEnabled: false;"
  >
    <!-- Markerless AR (Hit Testing) -->
    <a-entity
      id="burger"
      gltf-model="url(burger.glb)"
      scale="0.05 0.05 0.05" <!-- Smaller size -->
      position="0 0 0"
      visible="false" <!-- Initially hidden -->
      arjs-hit-test="targetElement: #burger;"
    ></a-entity>

    <!-- Camera -->
    <a-entity camera></a-entity>
  </a-scene>

  <!-- Loading Message -->
  <div class="arjs-loader">Loading AR experience...</div>

  <!-- Surface Detection Message -->
  <div class="arjs-surface-message">Point your camera at a flat surface to place the burger.</div>

  <script>
    // Hide loader when AR scene is loaded
    document.querySelector('a-scene').addEventListener('loaded', function () {
      document.querySelector('.arjs-loader').style.display = 'none';
    });

    // Show surface detection message and place the burger when the surface is detected
    const burger = document.querySelector('#burger');
    const surfaceMessage = document.querySelector('.arjs-surface-message');

    burger.addEventListener('arjs-hit-test-start', function () {
      surfaceMessage.style.display = 'block'; // Show surface detection message
    });

    burger.addEventListener('arjs-hit-test-achieved', function () {
      burger.setAttribute('visible', 'true'); // Show the burger
      surfaceMessage.style.display = 'none'; // Hide surface detection message
    });

    burger.addEventListener('arjs-hit-test-lost', function () {
      burger.setAttribute('visible', 'false'); // Hide the burger
      surfaceMessage.style.display = 'block'; // Show surface detection message again
    });
  </script>
</body>
</html>
